<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掼蛋 · 1v3 AI</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="table">

  <!-- Top: teammate -->
  <div class="player player-top" id="player-top">
    <div class="avatar">🤝</div>
    <div class="info">
      <div class="name">队友 (AI)</div>
      <div class="card-count"><span class="num">27</span> 张</div>
    </div>
    <div class="last-play-box"></div>
  </div>

  <!-- Left: left opponent -->
  <div class="player player-left" id="player-left">
    <div class="avatar">😈</div>
    <div class="info">
      <div class="name">左对手</div>
      <div class="card-count"><span class="num">27</span> 张</div>
    </div>
    <div class="last-play-box"></div>
  </div>

  <!-- Right: right opponent -->
  <div class="player player-right" id="player-right">
    <div class="avatar">😈</div>
    <div class="info">
      <div class="name">右对手</div>
      <div class="card-count"><span class="num">27</span> 张</div>
    </div>
    <div class="last-play-box"></div>
  </div>

  <!-- Center: shared last play area -->
  <div class="center-area">
    <div class="level-banner">级牌 <span id="level-banner">-</span></div>
    <div id="status-banner" class="status-banner">等待开局</div>
  </div>

  <!-- Bottom: human -->
  <div class="player player-bottom" id="player-bottom">
    <div class="hand-area">
      <div class="hand-meta">
        <span>你的手牌:<b id="hand-count">27</b> 张</span>
        <span id="hand-wild-info"></span>
      </div>
      <div class="hand" id="hand"></div>
    </div>
    <div class="action-bar">
      <button id="btn-play" class="btn primary" disabled>出 牌</button>
      <button id="btn-pass" class="btn">不 要</button>
      <button id="btn-clear" class="btn">取消选择</button>
      <button id="btn-new" class="btn ghost">新游戏</button>
      <div class="match-msg" id="match-msg"></div>
    </div>
  </div>

</div>

<!-- Log overlay -->
<div class="log-panel">
  <div class="log-title">对局记录 <button id="btn-toggle-log" class="log-toggle">收起</button></div>
  <ol id="log-list"></ol>
</div>

<script src="/app.js"></script>
</body>
</html>
